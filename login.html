<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login — Zenova Study Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBoKTKQh1FslukdDgp4YTLXDELyC7hSXBs",
    authDomain: "zenova-ecosystem.firebaseapp.com",
    projectId: "zenova-ecosystem",
    storageBucket: "zenova-ecosystem.firebasestorage.app",
    messagingSenderId: "104804319209",
    appId: "1:104804319209:web:fb6a4be936ef9447115578"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const btn = document.getElementById('loginBtn');
    const errEl = document.getElementById('errorMsg');

    btn.textContent = 'Logging in...';
    btn.disabled = true;
    errEl.classList.remove('show');

    try {
      await signInWithEmailAndPassword(auth, email, password);
      window.location.href = 'home.html';
    } catch (err) {
      errEl.textContent = getFriendlyError(err.code);
      errEl.classList.add('show');
      btn.textContent = 'Log In';
      btn.disabled = false;
    }
  });

  document.getElementById('googleBtn').addEventListener('click', async () => {
    const btn = document.getElementById('googleBtn');
    btn.textContent = 'Connecting...';
    btn.disabled = true;
    try {
      await signInWithPopup(auth, provider);
      window.location.href = 'home.html';
    } catch (err) {
      const errEl = document.getElementById('errorMsg');
      errEl.textContent = getFriendlyError(err.code);
      errEl.classList.add('show');
      btn.innerHTML = '<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18"/> Continue with Google';
      btn.disabled = false;
    }
  });

  function getFriendlyError(code) {
    const errors = {
      'auth/user-not-found': 'No account found with this email.',
      'auth/wrong-password': 'Incorrect password. Try again.',
      'auth/invalid-email': 'Please enter a valid email address.',
      'auth/too-many-requests': 'Too many attempts. Try again later.',
      'auth/invalid-credential': 'Email or password is incorrect.',
      'auth/popup-closed-by-user': 'Google sign-in was cancelled.',
    };
    return errors[code] || 'Something went wrong. Please try again.';
  }
</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0A1628;--navy-light:#153465;--accent:#2563EB;--accent-light:#3B82F6;
  --muted:#5B7291;--border:#E2E8F4;--red:#EF4444;
  --font:'Plus Jakarta Sans',sans-serif;--r:14px;--rs:8px;
}
html,body{height:100%;font-family:var(--font);background:#fff;color:var(--navy)}
body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px 20px}

.auth-box{width:100%;max-width:400px}
.brand{display:flex;align-items:center;gap:10px;margin-bottom:32px;text-decoration:none;justify-content:center}
.brand img{height:32px;width:32px;object-fit:contain}
.brand span{font-size:17px;font-weight:800;color:var(--navy)}
.brand span b{color:var(--accent)}

.auth-title{font-size:23px;font-weight:800;text-align:center;margin-bottom:6px}
.auth-sub{font-size:13.5px;color:var(--muted);text-align:center;line-height:1.6;margin-bottom:26px}

.google-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;padding:12px;border:1.5px solid var(--border);border-radius:var(--rs);background:#fff;font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;margin-bottom:18px}
.google-btn:disabled{opacity:0.6;cursor:not-allowed}

.divider{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.divider span{font-size:11.5px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;white-space:nowrap}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}

.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12.5px;font-weight:700;margin-bottom:6px}
.input-wrap{position:relative}
.input-wrap input{width:100%;padding:11px 14px 11px 40px;border:1.5px solid var(--border);border-radius:var(--rs);font-size:14px;font-family:var(--font);color:var(--navy);outline:none}
.input-wrap input:focus{border-color:var(--accent)}
.input-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:15px}
.toggle-pw{position:absolute;right:13px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:15px;color:var(--muted)}
.forgot{display:block;text-align:right;font-size:12.5px;font-weight:600;color:var(--navy);text-decoration:none;margin-top:6px}

.error-msg{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.25);color:var(--red);font-size:12.5px;font-weight:600;padding:9px 13px;border-radius:var(--rs);margin-bottom:14px;display:none}
.error-msg.show{display:block}

.submit-btn{width:100%;padding:13px;background:var(--accent);color:#fff;font-size:15px;font-weight:800;border:none;border-radius:var(--rs);cursor:pointer;font-family:var(--font);margin-top:6px}
.submit-btn:disabled{opacity:0.7;cursor:not-allowed}

.auth-switch{text-align:center;margin-top:22px;font-size:13.5px;color:var(--muted)}
.auth-switch a{color:var(--navy);font-weight:700;text-decoration:none}
</style>
</head>
<body>

<div class="auth-box">
  <a href="index.html" class="brand">
    <img src="logo.png" alt="Zenova"/>
    <span>Zenova <b>Study Hub</b></span>
  </a>

  <div class="auth-title">Welcome back 👋</div>
  <div class="auth-sub">Log in to continue your prep and pick up right where you left off.</div>

  <button class="google-btn" id="googleBtn">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" alt="Google"/>
    Continue with Google
  </button>

  <div class="divider"><span>or log in with email</span></div>

  <div class="error-msg" id="errorMsg"></div>

  <form id="loginForm">
    <div class="form-group">
      <label>Email Address</label>
      <div class="input-wrap">
        <span class="input-icon">✉️</span>
        <input type="email" id="email" placeholder="yourname@email.com" required/>
      </div>
    </div>
    <div class="form-group">
      <label>Password</label>
      <div class="input-wrap">
        <span class="input-icon">🔒</span>
        <input type="password" id="password" placeholder="Enter your password" required/>
        <button type="button" class="toggle-pw" onclick="togglePw()">👁</button>
      </div>
      <a href="#" class="forgot">Forgot password?</a>
    </div>
    <button type="submit" class="submit-btn" id="loginBtn">Log In →</button>
  </form>

  <div class="auth-switch">Don't have an account? <a href="signup.html">Sign up free</a></div>
</div>

<script>
function togglePw(){
  const inp = document.getElementById('password');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}
</script>
</body>
</html>

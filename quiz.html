  econ:[
  {"q": "Economics is best defined as the study of", "o": ["how to become wealthy quickly", "how individuals and societies allocate scarce resources to satisfy unlimited wants", "government spending only", "the stock market only"], "a": 1, "e": "Economics studies how individuals and societies allocate limited (scarce) resources to satisfy competing, unlimited wants."},
  {"q": "Economics is considered a science mainly because it", "o": ["uses systematic methods of observation, theory, and analysis", "only deals with money", "has no theories at all", "relies purely on guesswork"], "a": 0, "e": "Economics is regarded as a social science because it applies systematic observation, theory-building, and analysis to study economic behaviour."},
  {"q": "The basic economic problem faced by every society is", "o": ["too much wealth", "scarcity of resources relative to unlimited human wants", "excess of unused resources", "lack of any human wants"], "a": 1, "e": "The fundamental economic problem is scarcity — resources are limited while human wants are virtually unlimited."},
  {"q": "Scarcity in economics refers to", "o": ["the complete absence of resources", "the situation where available resources are insufficient to satisfy all wants", "a temporary shortage of one specific good", "unlimited resources available to everyone"], "a": 1, "e": "Scarcity describes the basic economic condition where resources are limited relative to the unlimited wants they could satisfy."},
  {"q": "The cost of the next best alternative given up when a choice is made is called", "o": ["Sunk cost", "Opportunity cost", "Fixed cost", "Marginal cost"], "a": 1, "e": "Opportunity cost is the value of the next best alternative that is forgone when a particular choice is made."},
  {"q": "Which of the following is an example of a basic economic concept studied in Economics?", "o": ["Choice and opportunity cost", "Photosynthesis", "Chemical bonding", "Poetic devices"], "a": 0, "e": "Choice and opportunity cost are foundational concepts in Economics, arising directly from the problem of scarcity."},
  {"q": "The four basic economic problems every economy must solve include what, how, for whom, and", "o": ["when to trade", "how much to produce/allocate resources over time", "who owns the land", "what colour to use"], "a": 1, "e": "Besides what, how, and for whom to produce, economies must also decide how much to produce and how to allocate resources over time."},
  {"q": "A curve that shows the maximum possible combinations of two goods an economy can produce with its given resources is called the", "o": ["Demand curve", "Production Possibility Frontier (PPF)", "Supply curve", "Indifference curve"], "a": 1, "e": "The Production Possibility Frontier (PPF) illustrates the maximum output combinations of two goods an economy can produce with fixed resources and technology."},
  {"q": "Points that lie inside (within) the Production Possibility Frontier represent", "o": ["efficient use of resources", "underutilization of available resources", "impossible levels of production", "maximum possible output"], "a": 1, "e": "Points inside the PPF indicate that resources are not being fully or efficiently utilized, so more of both goods could be produced."},
  {"q": "Points that lie outside the Production Possibility Frontier are", "o": ["achievable with current resources and technology", "currently unattainable with existing resources and technology", "the most efficient production points", "irrelevant to economic analysis"], "a": 1, "e": "Points beyond the PPF are unattainable given the current level of resources and technology available to the economy."},
  {"q": "A shift of the entire Production Possibility Frontier outward indicates", "o": ["economic decline", "economic growth, due to increased resources or improved technology", "a decrease in resources", "no change in the economy"], "a": 1, "e": "An outward shift of the PPF represents economic growth, resulting from an increase in resources or improvements in technology."},
  {"q": "An economic system in which resource allocation decisions are made mainly by market forces of demand and supply is called a", "o": ["Command economy", "Free market (capitalist) economy", "Mixed economy only", "Traditional economy"], "a": 1, "e": "In a free market (capitalist) economy, prices and resource allocation are primarily determined by the interaction of demand and supply."},
  {"q": "An economic system in which the government makes most decisions on production, resource allocation, and distribution is called a", "o": ["Free market economy", "Command (planned) economy", "Mixed economy", "Barter economy"], "a": 1, "e": "In a command (planned) economy, the government (or central planning authority) makes the key decisions about production and resource allocation."},
  {"q": "An economic system that combines elements of both free market and government control is called a", "o": ["Traditional economy", "Command economy", "Mixed economy", "Barter economy"], "a": 2, "e": "A mixed economy combines features of both the free market and government-planned systems, with both private enterprise and government intervention."},
  {"q": "An economic system where production and distribution decisions are guided mainly by customs and traditions passed down through generations is called a", "o": ["Traditional economy", "Command economy", "Mixed economy", "Free market economy"], "a": 0, "e": "In a traditional economy, economic decisions are guided largely by long-standing customs, traditions, and inherited roles."},
  {"q": "Which of the following economic questions asks who receives the goods and services produced?", "o": ["What to produce?", "How to produce?", "For whom to produce?", "When to produce?"], "a": 2, "e": "'For whom to produce?' addresses how goods and services are distributed among members of society."},
  {"q": "A simple diagram or model used to represent economic relationships, such as demand and supply, is an example of an", "o": ["economic tool of analysis", "agricultural implement", "legal document", "historical record"], "a": 0, "e": "Diagrams, graphs, and models are key tools of economic analysis, used to represent and study relationships like demand and supply."},
  {"q": "An 'assumption' in economic analysis, such as 'ceteris paribus' (all else being equal), is used mainly to", "o": ["make the analysis more complicated", "simplify analysis by holding other factors constant while studying one variable", "eliminate the need for any theory", "replace real-world data entirely"], "a": 1, "e": "The 'ceteris paribus' assumption simplifies economic analysis by holding other variables constant while examining the effect of one factor at a time."},
  {"q": "A factor of production that includes natural resources like land, water, and minerals is called", "o": ["Labour", "Land", "Capital", "Entrepreneurship"], "a": 1, "e": "'Land' as a factor of production refers to all natural resources used in production, including soil, water, and minerals."},
  {"q": "The factor of production that involves human effort, whether physical or mental, used in producing goods and services is called", "o": ["Capital", "Land", "Labour", "Enterprise"], "a": 2, "e": "Labour refers to the human effort, both physical and mental, contributed toward the production of goods and services."},
],
  commerce:[
  {"q": "Commerce is best defined as", "o": ["only the manufacturing of goods", "all activities involved in the buying, selling, and distribution of goods and services, including trade and aids to trade", "farming activities only", "government taxation policy"], "a": 1, "e": "Commerce covers all activities involved in the exchange of goods and services, including trade itself and the various aids to trade (transport, banking, insurance, etc.)."},
  {"q": "The main branches of commerce are", "o": ["trade and aids to trade", "only manufacturing and mining", "only banking and insurance", "farming and fishing"], "a": 0, "e": "Commerce is broadly divided into trade (buying and selling) and aids to trade (services that facilitate trade, like transport and banking)."},
  {"q": "Trade refers to", "o": ["the entire process of production only", "the buying and selling of goods and services", "the transportation of goods only", "the manufacturing of raw materials"], "a": 1, "e": "Trade is the branch of commerce concerned specifically with the buying and selling of goods and services."},
  {"q": "Trade carried out within the boundaries of a single country is called", "o": ["International trade", "Home (domestic) trade", "Export trade", "Entrepot trade"], "a": 1, "e": "Home (domestic) trade refers to the buying and selling of goods and services within the borders of one country."},
  {"q": "Trade carried out between two or more different countries is called", "o": ["Home trade", "Retail trade", "International trade", "Wholesale trade"], "a": 2, "e": "International trade involves the exchange of goods and services across national borders, between different countries."},
  {"q": "Home trade is broadly divided into", "o": ["Wholesale trade and retail trade", "Import trade and export trade only", "Entrepot trade and re-export trade", "Barter trade and cash trade"], "a": 0, "e": "Home (domestic) trade is divided into wholesale trade (selling in bulk) and retail trade (selling in small quantities to final consumers)."},
  {"q": "A wholesaler is a trader who", "o": ["sells goods directly to final consumers in small quantities", "buys goods in bulk from producers and sells in smaller quantities to retailers", "only manufactures goods", "only exports goods abroad"], "a": 1, "e": "A wholesaler buys goods in large quantities from producers or manufacturers and sells them in smaller quantities to retailers."},
  {"q": "A retailer is a trader who", "o": ["sells goods in bulk to other traders", "sells goods in small quantities directly to final consumers", "only imports goods from abroad", "manufactures raw materials"], "a": 1, "e": "A retailer purchases goods, often from wholesalers, and sells them in small quantities directly to the final consumer."},
  {"q": "International trade involving the import of goods into a country from abroad is called", "o": ["Export trade", "Import trade", "Entrepot trade", "Home trade"], "a": 1, "e": "Import trade refers to the purchase of goods and services from other countries into the home country."},
  {"q": "International trade involving the sale of goods from a country to other countries is called", "o": ["Import trade", "Export trade", "Home trade", "Retail trade"], "a": 1, "e": "Export trade refers to the sale of goods and services produced in the home country to foreign countries."},
  {"q": "Entrepot trade refers to", "o": ["trade conducted entirely within one country", "the importation of goods into a country for re-export to other countries", "the sale of goods to final consumers only", "farming for subsistence"], "a": 1, "e": "Entrepot trade involves importing goods into a country, often for storage or minor processing, before re-exporting them to other countries."},
  {"q": "Occupation, in the economic sense, refers to", "o": ["a person's leisure activities", "the type of work or job an individual engages in to earn a living", "the location where a person resides", "a government policy"], "a": 1, "e": "Occupation refers to the specific job, trade, or profession an individual engages in to earn income and a livelihood."},
  {"q": "Occupations that involve the direct extraction of raw materials from nature, such as fishing and mining, are called", "o": ["Primary occupations", "Secondary occupations", "Tertiary occupations", "Commercial occupations only"], "a": 0, "e": "Primary occupations involve the direct extraction of natural resources, such as farming, fishing, and mining."},
  {"q": "Occupations that involve converting raw materials into finished or semi-finished goods, such as manufacturing, are called", "o": ["Primary occupations", "Secondary occupations", "Tertiary occupations", "Extractive occupations"], "a": 1, "e": "Secondary occupations involve processing or manufacturing raw materials into finished or semi-finished products."},
  {"q": "Occupations that provide services rather than physical goods, such as teaching or banking, are called", "o": ["Primary occupations", "Secondary occupations", "Tertiary occupations", "Agricultural occupations"], "a": 2, "e": "Tertiary occupations involve the provision of services, such as banking, teaching, healthcare, and transportation."},
  {"q": "Production, in the commercial sense, refers to", "o": ["only the buying of goods", "the creation of goods and services that satisfy human wants", "the storage of finished goods only", "government spending"], "a": 1, "e": "Production refers to the process of creating goods and services that are capable of satisfying human wants and needs."},
  {"q": "Which of the following is an example of primary production?", "o": ["Fishing", "Manufacturing of shoes", "Retailing of clothes", "Banking services"], "a": 0, "e": "Fishing is a form of primary production, as it involves the direct extraction of a natural resource."},
  {"q": "Which of the following is an example of secondary production?", "o": ["Crude oil extraction", "Refining crude oil into petrol", "Farming of crops", "Wholesaling of goods"], "a": 1, "e": "Refining crude oil into usable products like petrol is secondary production, as it involves processing a raw material into a finished product."},
  {"q": "Which of the following is an example of tertiary production?", "o": ["Mining of gold", "Manufacturing of furniture", "Insurance services", "Crop farming"], "a": 2, "e": "Insurance is a tertiary (service) production activity, as it provides a service rather than a physical, tangible good."},
  {"q": "The interdependence between primary, secondary, and tertiary production means that", "o": ["each stage operates in complete isolation from the others", "each stage relies on the others to function effectively, e.g. secondary production needs raw materials from primary production", "only tertiary production is important", "primary production has no connection to the other stages"], "a": 1, "e": "The stages of production are interdependent — for example, secondary (manufacturing) production relies on raw materials supplied by primary production, and tertiary services support both."},
],
  account:[
  {"q": "The users of accounting information mainly include", "o": ["only the government", "owners, managers, creditors, employees and government", "only competitors", "only customers"], "a": 1, "e": "Accounting information is used by a wide range of stakeholders, including owners, managers, creditors, employees, and government agencies."},
  {"q": "The branch of accounting concerned with providing information to external users like investors and creditors is", "o": ["Management accounting", "Financial accounting", "Cost accounting", "Tax accounting"], "a": 1, "e": "Financial accounting focuses on preparing reports (like financial statements) for external users such as investors and creditors."},
  {"q": "The branch of accounting that provides information to help managers plan and control internal operations is", "o": ["Financial accounting", "Management accounting", "Auditing", "Public sector accounting"], "a": 1, "e": "Management accounting provides internal reports and analysis to help managers with planning, controlling and decision-making."},

const DEFAULT_Q = [
  {q:"Best strategy for a difficult CBT question:",o:["Leave blank","Spend all time on it","Skip and return","Always pick A"],a:2,e:"Skip hard questions, finish easy ones, then return with remaining time."},
  {q:"Recommended minimum JAMB score for most universities:",o:["150","180","200","250"],a:2,e:"Most universities require 200+, though some set higher cut-offs."},
  {q:"Most effective long-term study technique:",o:["Cramming","Spaced repetition","Reading once","Avoiding past questions"],a:1,e:"Spaced repetition — reviewing at increasing intervals — is the most evidence-based technique."},
  {q:"Minutes in 1 hour 30 minutes:",o:["60","80","90","100"],a:2,e:"60 + 30 = 90 minutes."},
  {q:"What % of JAMB questions follow patterns from previous years?",o:["30%","50%","70%","90%"],a:2,e:"Research shows ~70% of JAMB questions follow patterns from previous years."},
];

function getQs(id, count) {
  count = count || 20;
  let qs = QUESTIONS[id] ? [...QUESTIONS[id]] : [];
  while (qs.length < count) qs = [...qs, ...DEFAULT_Q];
  return shuffle(qs).slice(0, count);
}
function shuffle(a) {
  for (let i=a.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

const grid = document.getElementById('subjGrid');
SUBJECTS.forEach(s => {
  const c = document.createElement('div');
  c.className = 'sc';
  c.innerHTML = `<div class="sc-icon">${s.icon}</div><div class="sc-name">${s.name}</div><div class="sc-meta">20 Qs · 25 mins</div><div class="sc-badge">Live</div>`;
  c.onclick = () => openCountModal(s);
  grid.appendChild(c);
});

const COUNT_OPTS = [10, 20, 30, 50];

function openCountModal(s) {
  const avail = (QUESTIONS[s.id] || []).length || DEFAULT_Q.length;
  document.getElementById('mIcon').textContent = s.icon;
  document.getElementById('mName').textContent = s.name;
  const cg = document.getElementById('countGrid');
  cg.innerHTML = COUNT_OPTS.map(n => {
    const disabled = n > avail;
    const label = disabled ? `Only ${avail} available` : '~' + Math.round(n*1.25) + ' mins';
    return `<div class="count-opt${disabled?' disabled':''}" ${disabled?'':`onclick="startTest(SUBJECTS.find(x=>x.id==='${s.id}'), ${n})"`}>
      <div class="count-opt-n">${n}</div><div class="count-opt-l">${label}</div>
    </div>`;
  }).join('') + `<div class="count-opt" onclick="startTest(SUBJECTS.find(x=>x.id==='${s.id}'), ${avail})">
      <div class="count-opt-n">${avail}</div><div class="count-opt-l">All available</div>
    </div>`;
  document.getElementById('countModal').classList.add('show');
}
function closeCountModal() {
  document.getElementById('countModal').classList.remove('show');
}

let subj, qs, cur, ans, timerInt, timeLeft, startTime;

function startTest(s, count) {
  closeCountModal();
  subj=s; qs=getQs(s.id, count); cur=0; ans={};
  timeLeft = Math.max(5, Math.round(qs.length*1.25)) * 60;
  startTime=Date.now();
  document.getElementById('tIcon').textContent = s.icon;
  document.getElementById('tName').textContent = s.name;
  document.querySelector('.test-subj-week').textContent = `${qs.length} Questions · ${Math.round(timeLeft/60)} mins`;
  buildDots();
  show('testScreen');
  renderQ();
  startTimer();
}

function buildDots() {
  const el = document.getElementById('qDots');
  el.innerHTML = '';
  qs.forEach((_,i) => {
    const d=document.createElement('div');
    d.className='qdot'+(i===0?' cur':'');
    d.onclick=()=>jumpTo(i);
    el.appendChild(d);
  });
}

function updateDots() {
  document.querySelectorAll('.qdot').forEach((d,i) => {
    d.className='qdot';
    if(i===cur) d.classList.add('cur');
    if(ans[i]!==undefined) d.classList.add(ans[i]===qs[i].a ? 'ok' : 'bad');
  });
}

function renderQ() {
  const q=qs[cur]; const total=qs.length; const LETTERS=['A','B','C','D'];
  document.getElementById('qNum').textContent=`Question ${cur+1} of ${total}`;
  document.getElementById('qText').textContent=q.q;
  document.getElementById('progFill').style.width=`${((cur+1)/total)*100}%`;
  document.getElementById('progTxt').textContent=`${cur+1}/${total}`;
  const locked = ans[cur]!==undefined;
  const optsEl = document.getElementById('opts');
  optsEl.innerHTML = q.o.map((opt,i) => {
    let cls = 'opt' + (locked ? ' locked' : '');
    if(locked) {
      if(i===q.a) cls+=' ok';
      else if(i===ans[cur]) cls+=' bad';
    } else if(i===ans[cur]) cls+=' sel';
    return `<div class="${cls}" ${locked?'':'onclick="pick('+i+')"'}><div class="opt-ltr">${LETTERS[i]}</div>${opt}</div>`;
  }).join('');
  const exp=document.getElementById('expBox');
  if(locked) {
    const ok=ans[cur]===q.a;
    exp.textContent=(ok?'✅ Correct! ':'❌ Incorrect. ')+q.e;
    exp.className='exp-box show '+(ok?'ok-exp':'bad-exp');
  } else { exp.className='exp-box'; exp.textContent=''; }
  document.getElementById('prevBtn').disabled=cur===0;
  const nb=document.getElementById('nextBtn');
  if(cur===total-1) { nb.textContent='Submit ✓'; nb.className='btn-next submit'; }
  else { nb.textContent='Next →'; nb.className='btn-next'; }
  updateDots();
}

function pick(i) {
  if(ans[cur]!==undefined) return;
  ans[cur]=i; renderQ();
}
function go(dir) {
  if(dir===1 && cur===qs.length-1) { submitTest(); return; }
  cur=Math.max(0,Math.min(qs.length-1,cur+dir));
  renderQ();
}
function jumpTo(i) { cur=i; renderQ(); }

function startTimer() {
  clearInterval(timerInt);
  timerInt=setInterval(()=>{
    timeLeft--;
    const m=Math.floor(timeLeft/60), s=timeLeft%60;
    const el=document.getElementById('timer');
    el.textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
    el.className='timer'+(timeLeft<=300?' warn':'')+(timeLeft<=60?' danger':'');
    if(timeLeft<=0){clearInterval(timerInt);submitTest();}
  },1000);
}

async function submitTest() {
  clearInterval(timerInt);
  const total=qs.length;
  let correct=0, skipped=0;
  qs.forEach((_,i)=>{ if(ans[i]===undefined) skipped++; else if(ans[i]===qs[i].a) correct++; });
  const wrong=total-correct-skipped;
  const pct=Math.round((correct/total)*100);
  const elapsed=Math.round((Date.now()-startTime)/1000);
  const mm=Math.floor(elapsed/60), ss=elapsed%60;
  const col=pct>=70?'#22C55E':pct>=50?'#F59E0B':'#EF4444';
  const grade=pct>=70?'Excellent 🎉':pct>=50?'Good Job 👍':'Keep Going 💪';

  document.getElementById('resPct').innerHTML=pct+'<small>%</small>';
  document.getElementById('resGrade').textContent=grade;
  document.getElementById('resGrade').style.color=col;
  document.getElementById('resRing').style.stroke=col;
  document.getElementById('resTitle').textContent=pct>=70?'Outstanding! 🏆':'Test Complete!';
  document.getElementById('resSub').textContent=`You scored ${correct} out of ${total} in ${subj.name}. ${pct>=70?'You are on track for 300+!':pct>=50?'Review your wrong answers and retake.':'Study this topic again and come back stronger.'}`;
  document.getElementById('rsCorrect').textContent=correct;
  document.getElementById('rsWrong').textContent=wrong;
  document.getElementById('rsSkipped').textContent=skipped;
  document.getElementById('rsTime').textContent=`${mm}m ${ss}s`;
  show('resultScreen');
  setTimeout(()=>{ document.getElementById('resRing').style.strokeDashoffset=389.6-(pct/100)*389.6; },300);

  try { await saveScore(subj.id, '1-3', correct, total); }
  catch(e) { console.error('Save error:', e); }
}

function retake() { startTest(subj, qs.length); }

function show(id) {
  ['pickScreen','testScreen','resultScreen'].forEach(s=>{
    document.getElementById(s).classList.toggle('active', s===id);
  });
  window.scrollTo(0,0);
}

// Auto-start if ?subject=xxx is present in the URL
const params = new URLSearchParams(window.location.search);
const preselect = params.get('subject');
if (preselect) {
  const found = SUBJECTS.find(s => s.id === preselect);
  if (found) openCountModal(found);
}
</script>

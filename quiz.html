<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const app  = initializeApp({apiKey:"AIzaSyBoKTKQh1FslukdDgp4YTLXDELyC7hSXBs",authDomain:"zenova-ecosystem.firebaseapp.com",projectId:"zenova-ecosystem",storageBucket:"zenova-ecosystem.firebasestorage.app",messagingSenderId:"104804319209",appId:"1:104804319209:web:fb6a4be936ef9447115578"});
  const auth = getAuth(app);
  const db   = getFirestore(app);
  let currentUser = null;

  onAuthStateChanged(auth, user => {
    if (!user) { window.location.href = 'login.html'; return; }
    currentUser = user;
  });

  window.saveScore = async (subjectId, week, correct, total) => {
    if (!currentUser) return;
    const pct = Math.round((correct / total) * 100);
    const ref  = doc(db, 'users', currentUser.uid);
    const snap = await getDoc(ref);
    const data = snap.exists() ? snap.data() : {};
    const progress = data.progress || {};
    progress[subjectId] = Math.max(progress[subjectId] || 0, pct);
    const scoreEntry = { subjectId, week, score: pct, correct, total, date: Date.now() };
    await setDoc(ref, { progress, scores: arrayUnion(scoreEntry) }, { merge: true });
  };
</script>

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{

.week-pill{background:var(--accent);color:#fff;font-weight:800;font-size:12px;padding:6px 16px;border-radius:100px;white-space:nowrap}
.subj-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.sc{background:#fff;border:1.5px solid var(--border);box-shadow:0 2px 6px rgba(10,22,40,0.04);border-radius:var(--r);padding:18px 12px;cursor:pointer;transition:all .2s;text-align:center;display:flex;flex-direction:column;align-items:center;gap:6px}
.sc:hover{border-color:var(--accent);box-shadow:0 6px 20px rgba(37,99,235,0.25)}
.sc-icon{font-size:28px}
.sc-name{font-size:13px;font-weight:700;line-height:1.3}
.sc-meta{font-size:10.5px;color:var(--muted)}
.sc-badge{background:var(--accent-dim);color:var(--accent);font-size:10px;font-weight:700;padding:3px 10px;border-radius:100px}

/* TEST SCREEN */
.test-top{background:#fff;border:1.5px solid var(--border);box-shadow:0 2px 8px rgba(10,22,40,0.05);border-radius:var(--r);padding:14px 16px;margin-bottom:12px}
.test-top-row1{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.test-subj-info{display:flex;align-items:center;gap:8px}
.test-subj-icon{font-size:22px}
.test-subj-name{font-size:15px;font-weight:800}
.test-subj-week{font-size:11px;color:var(--muted);margin-top:1px}
.timer{background:var(--navy);color:#fff;font-size:16px;font-weight:800;padding:7px 14px;border-radius:var(--rs);font-variant-numeric:tabular-nums;min-width:74px;text-align:center}
.timer.warn{background:var(--amber)}
.timer.danger{background:var(--red);animation:blink .5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.6}}
.test-top-row2{display:flex;align-items:center;gap:8px}
.prog-bar{flex:1;height:6px;background:#E8EDF5;border-radius:4px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-light));border-radius:4px;transition:width .4s}
.prog-txt{font-size:11px;font-weight:700;color:var(--muted);white-space:nowrap}
.q-dots{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px}
.qdot{width:8px;height:8px;border-radius:50%;background:#E2E8F4;border:1.5px solid transparent;cursor:pointer;transition:all .2s;flex-shrink:0}
.qdot.cur{border-color:var(--navy);transform:scale(1.3)}
.qdot.ok{background:var(--green);border-color:var(--green)}
.qdot.bad{background:var(--red);border-color:var(--red)}

.qcard{background:#fff;border:1.5px solid var(--border);box-shadow:0 2px 8px rgba(10,22,40,0.05);border-radius:var(--r);padding:20px 18px 16px;margin-bottom:12px}

.opts{display:flex;flex-direction:column;gap:8px}
.opt{display:flex;align-items:center;gap:10px;padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--rs);cursor:pointer;transition:all .2s;font-size:13.5px;font-weight:500;background:#fff;text-align:left}
.opt:hover:not(.locked){border-color:var(--accent);background:var(--accent-dim)}
.opt.sel{border-color:var(--accent);background:var(--accent-dim);font-weight:700}
.opt.ok{border-color:var(--green);background:rgba(34,197,94,0.09);font-weight:700;color:#166534}
.opt.bad{border-color:var(--red);background:rgba(239,68,68,0.08);font-weight:700;color:#991B1B}
.opt.locked{cursor:default}
.opt-ltr{width:26px;height:26px;border-radius:50%;background:#E8EDF5;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}
.opt.sel .opt-ltr{background:var(--accent);color:#fff}
.opt.ok .opt-ltr{background:var(--green);color:#fff}
.opt.bad .opt-ltr{background:var(--red);color:#fff}
.exp-box{margin-top:12px;padding:11px 14px;border-radius:0 var(--rs) var(--rs) 0;font-size:12.5px;line-height:1.6;display:none}
.exp-box.show{display:block}
.exp-box.ok-exp{background:rgba(34,197,94,0.08);border-left:3px solid var(--green);color:#166534}
.exp-box.bad-exp{background:rgba(239,68,68,0.07);border-left:3px solid var(--red);color:#991B1B}

.test-nav{display:flex;justify-content:space-between;align-items:center;gap:10px}
.btn-prev{padding:10px 18px;border-radius:var(--rs);border:1.5px solid var(--border);background:#fff;font-weight:700;font-size:13px;cursor:pointer;font-family:var(--font)}
.btn-prev:disabled{opacity:.4;cursor:not-allowed}
.btn-next{padding:10px 24px;border-radius:var(--rs);border:none;background:var(--accent);color:#fff;font-weight:800;font-size:13px;cursor:pointer;font-family:var(--font);box-shadow:0 4px 14px rgba(37,99,235,0.3)}
.btn-next.submit{background:var(--green);box-shadow:0 4px 14px rgba(34,197,94,0.3)}

/* RESULT */
.result-wrap{max-width:480px;margin:20px auto 0}
.result-card{background:#fff;border:1.5px solid var(--border);border-radius:20px;padding:32px 24px;text-align:center}
.res-ring{position:relative;width:130px;height:130px;margin:0 auto 20px}
.res-ring svg{position:absolute;inset:0}
.res-ring-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.res-pct{font-size:32px;font-weight:800;line-height:1}

.res-grade{font-size:12px;font-weight:700;margin-top:3px}
.res-title{font-size:20px;font-weight:800;margin-bottom:6px}
.res-sub{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:22px}
.res-stats{display:flex;justify-content:center;gap:20px;margin-bottom:26px;flex-wrap:wrap}
.rs .rv{font-size:22px;font-weight:800}
.rs .rl{font-size:11px;color:var(--muted);margin-top:2px}
.res-btns{display:flex;flex-direction:column;gap:8px}
.btn-g{background:var(--accent);color:#fff;font-weight:800;font-size:13.5px;padding:11px 20px;border-radius:var(--rs);border:none;cursor:pointer;font-family:var(--font);text-decoration:none}
.btn-o{background:transparent;color:var(--navy);font-weight:700;font-size:13.5px;padding:11px 20px;border-radius:var(--rs);border:1.5px solid var(--border);cursor:pointer;font-family:var(--font);text-decoration:none}

.modal-bg{position:fixed;inset:0;background:rgba(10,22,40,0.5);z-index:200;display:none;align-items:flex-end;justify-content:center}

</style>

  chem:[
  {"q": "The process of separating a mixture of solid particles of different sizes using a mesh is called", "o": ["Decantation", "Sieving", "Evaporation", "Sublimation"], "a": 1, "e": "Sieving separates solid particles of different sizes by passing the mixture through a mesh or sieve."},
  {"q": "The technique used to separate a solid from a liquid by pouring off the liquid, leaving the solid behind, is called", "o": ["Filtration", "Decantation", "Distillation", "Crystallization"], "a": 1, "e": "Decantation is the process of carefully pouring off a liquid from a settled solid, without disturbing the sediment."},
  {"q": "The technique used to separate an insoluble solid from a liquid using a porous material is called", "o": ["Filtration", "Evaporation", "Sublimation", "Chromatography"], "a": 0, "e": "Filtration separates an insoluble solid from a liquid by passing the mixture through a filter paper or porous material."},
  {"q": "The process of obtaining a solid from its solution by heating off the liquid is called", "o": ["Filtration", "Evaporation", "Decantation", "Sieving"], "a": 1, "e": "Evaporation involves heating a solution to drive off the liquid (solvent), leaving the dissolved solid behind."},
  {"q": "The process used to separate a mixture of miscible liquids with different boiling points is called", "o": ["Filtration", "Simple distillation", "Sieving", "Decantation"], "a": 1, "e": "Distillation separates liquids with different boiling points by heating, vaporizing, and then condensing them separately."},
  {"q": "The process by which a solid changes directly into a gas without passing through the liquid state is called", "o": ["Evaporation", "Sublimation", "Condensation", "Filtration"], "a": 1, "e": "Sublimation is the direct change of a substance from solid to gas (or gas to solid) without passing through a liquid phase, e.g. iodine or dry ice."},
  {"q": "The technique used to separate the components of a mixture based on their different rates of movement through a medium is called", "o": ["Chromatography", "Crystallization", "Decantation", "Sieving"], "a": 0, "e": "Chromatography separates mixture components based on differing rates of movement through a stationary medium, often using a solvent."},
  {"q": "The process of obtaining pure solid crystals from a saturated solution as it cools is called", "o": ["Sublimation", "Crystallization", "Filtration", "Sieving"], "a": 1, "e": "Crystallization is the process by which pure solid crystals form as a saturated solution cools and the dissolved substance comes out of solution."},
  {"q": "A mixture of two immiscible liquids (e.g. oil and water) is best separated using a", "o": ["filter funnel", "separating funnel", "Bunsen burner", "measuring cylinder"], "a": 1, "e": "A separating funnel is used to separate immiscible liquids based on their different densities, allowing them to be drawn off separately."},
  {"q": "Purification of a substance is important mainly because it helps to", "o": ["increase the mass of the substance", "remove unwanted impurities and obtain the substance in its pure form", "change the chemical identity of the substance", "add colour to the substance"], "a": 1, "e": "Purification removes impurities from a substance, ensuring it is obtained in a chemically pure state for accurate use or study."},
  {"q": "A chemical combination in which two or more elements combine in fixed proportions to form a compound illustrates the law of", "o": ["conservation of mass", "constant (definite) proportions", "multiple proportions", "octaves"], "a": 1, "e": "The law of constant (definite) proportions states that a chemical compound always contains its constituent elements in fixed proportion by mass."},
  {"q": "The law of conservation of mass states that in a chemical reaction, mass is", "o": ["always destroyed", "always created", "neither created nor destroyed, only transformed", "doubled"], "a": 2, "e": "The law of conservation of mass states that mass is neither created nor destroyed in a chemical reaction, only rearranged."},
  {"q": "A chemical equation must be balanced mainly to satisfy the", "o": ["law of octaves", "law of conservation of mass", "periodic law", "law of multiple proportions"], "a": 1, "e": "Balancing a chemical equation ensures the number of atoms of each element is equal on both sides, consistent with the law of conservation of mass."},
  {"q": "In the balanced equation 2H₂ + O₂ → 2H₂O, the number of hydrogen atoms on the reactant side is", "o": ["2", "4", "6", "8"], "a": 1, "e": "2H₂ represents 2 molecules of hydrogen gas, each with 2 atoms, giving a total of 4 hydrogen atoms."},
  {"q": "The mole is defined as the amount of substance that contains as many elementary particles as there are atoms in", "o": ["1 g of hydrogen", "12 g of carbon-12", "1 litre of water", "100 g of oxygen"], "a": 1, "e": "One mole is defined as the amount of substance containing the same number of particles as there are atoms in exactly 12 grams of carbon-12."},
  {"q": "The number of particles in one mole of any substance, known as Avogadro's number, is approximately", "o": ["6.02 × 10²³", "3.14 × 10²³", "1.6 × 10⁻¹⁹", "9.8 × 10⁴"], "a": 0, "e": "Avogadro's number, 6.02 × 10²³, represents the number of particles (atoms, molecules, or ions) in one mole of a substance."},
  {"q": "The molar mass of a substance is the mass of", "o": ["one atom of the substance", "one mole of the substance, expressed in grams per mole", "one litre of the substance", "one gram of the substance"], "a": 1, "e": "Molar mass is the mass of one mole of a substance, expressed in grams per mole (g/mol)."},
  {"q": "The number of moles in 32 g of oxygen gas, O₂ (molar mass 32 g/mol), is", "o": ["0.5 mol", "1 mol", "2 mol", "4 mol"], "a": 1, "e": "Number of moles = mass/molar mass = 32/32 = 1 mol."},
  {"q": "Stoichiometry in chemistry refers to the", "o": ["study of atomic structure", "quantitative relationship between reactants and products in a chemical reaction", "classification of elements in the periodic table", "study of chemical bonding only"], "a": 1, "e": "Stoichiometry is the study of the quantitative (mole) relationships between reactants and products in a balanced chemical equation."},
  {"q": "In the equation N₂ + 3H₂ → 2NH₃, how many moles of hydrogen gas are needed to react completely with 1 mole of nitrogen gas?", "o": ["1 mole", "2 moles", "3 moles", "4 moles"], "a": 2, "e": "According to the balanced equation, 1 mole of N₂ requires 3 moles of H₂ to react completely, producing 2 moles of NH₃."},

  {"q": "The nth term of the arithmetic progression 2, 5, 8, 11, ... is given by", "o": ["3n - 1", "3n + 1", "2n + 3", "n + 2"], "a": 0, "e": "First term a=2, common difference d=3. nth term = a + (n-1)d = 2 + 3n - 3 = 3n - 1."},

  bio:[
  {"q": "Which of the following is a characteristic shared by all living things?", "o": ["Ability to fly", "Ability to respire", "Green colour", "Presence of a shell"], "a": 1, "e": "Respiration, the release of energy from food, is a fundamental characteristic shared by all living organisms."},
  {"q": "The ability of living organisms to respond to changes in their environment is called", "o": ["Nutrition", "Irritability (sensitivity)", "Excretion", "Growth"], "a": 1, "e": "Irritability, or sensitivity, is the ability of an organism to detect and respond to stimuli in its environment."},
  {"q": "The process by which living organisms produce new individuals of their own kind is called", "o": ["Nutrition", "Respiration", "Reproduction", "Excretion"], "a": 2, "e": "Reproduction is the biological process by which living organisms produce offspring, ensuring the continuation of their species."},
  {"q": "The process by which living organisms increase in size and mass over time is called", "o": ["Growth", "Excretion", "Irritability", "Respiration"], "a": 0, "e": "Growth refers to the permanent increase in size and mass of a living organism, usually through cell division and enlargement."},
  {"q": "The removal of metabolic waste products from the body of an organism is called", "o": ["Nutrition", "Excretion", "Reproduction", "Movement"], "a": 1, "e": "Excretion is the process by which organisms eliminate waste products of metabolism from their bodies."},
  {"q": "The intake and use of food materials by living organisms for energy and growth is called", "o": ["Nutrition", "Excretion", "Irritability", "Respiration"], "a": 0, "e": "Nutrition refers to the process by which organisms obtain and utilize food for energy, growth, and repair."},
  {"q": "The ability of an organism to change its position or location is called", "o": ["Growth", "Movement", "Excretion", "Nutrition"], "a": 1, "e": "Movement is the characteristic ability of living organisms to change position, either the whole body or parts of it."},
  {"q": "The basic structural and functional unit of life is the", "o": ["Tissue", "Cell", "Organ", "Organism"], "a": 1, "e": "The cell is considered the basic structural and functional unit of all living organisms."},
  {"q": "The branch of biology that deals with the study of cells is called", "o": ["Ecology", "Cytology", "Taxonomy", "Genetics"], "a": 1, "e": "Cytology is the branch of biology specifically concerned with the study of the structure and function of cells."},
  {"q": "The structure that controls the entry and exit of substances into and out of a cell is the", "o": ["Nucleus", "Cell membrane", "Cell wall", "Mitochondrion"], "a": 1, "e": "The cell membrane (plasma membrane) is selectively permeable, regulating what substances enter and leave the cell."},
  {"q": "The structure that contains the genetic material and controls the activities of the cell is the", "o": ["Cytoplasm", "Cell wall", "Nucleus", "Vacuole"], "a": 2, "e": "The nucleus houses the cell's genetic material (DNA) and directs the cell's activities, including growth and reproduction."},
  {"q": "The jelly-like substance within a cell, where most cellular activities occur, is the", "o": ["Nucleus", "Cytoplasm", "Cell wall", "Chloroplast"], "a": 1, "e": "Cytoplasm is the jelly-like substance filling the cell, where organelles are suspended and many metabolic processes occur."},
  {"q": "The organelle responsible for releasing energy through cellular respiration is the", "o": ["Nucleus", "Mitochondrion", "Ribosome", "Golgi body"], "a": 1, "e": "The mitochondrion is often called the 'powerhouse of the cell' because it generates most of the cell's energy through respiration."},
  {"q": "The rigid outer structure found in plant cells, but absent in animal cells, is the", "o": ["Cell membrane", "Cell wall", "Nucleus", "Cytoplasm"], "a": 1, "e": "The cell wall is a rigid outer layer found in plant cells (made mainly of cellulose), providing structure and support; animal cells lack this structure."},
  {"q": "The green pigment-containing organelle found in plant cells, responsible for photosynthesis, is the", "o": ["Mitochondrion", "Chloroplast", "Ribosome", "Nucleus"], "a": 1, "e": "The chloroplast contains chlorophyll and is the site of photosynthesis in plant cells."},
  {"q": "A large, fluid-filled sac found in mature plant cells, used for storage, is the", "o": ["Vacuole", "Nucleus", "Ribosome", "Lysosome"], "a": 0, "e": "The vacuole, especially large and prominent in mature plant cells, stores water, nutrients, and waste products."},
  {"q": "Which of the following structures is present in both plant and animal cells?", "o": ["Cell wall", "Chloroplast", "Nucleus", "Large permanent vacuole"], "a": 2, "e": "The nucleus is a structure common to both plant and animal cells, unlike the cell wall, chloroplast, and large permanent vacuole, which are typically found only in plant cells."},
  {"q": "A group of similar cells performing a specific function together forms a", "o": ["Organ", "Tissue", "System", "Organism"], "a": 1, "e": "A tissue is a group of similar cells working together to perform a specific function, e.g. muscle tissue."},
  {"q": "A group of different tissues working together to perform a specific function forms an", "o": ["Organelle", "Organ", "Cell", "Species"], "a": 1, "e": "An organ is formed from different tissues working together to carry out a particular function, e.g. the heart or a leaf."},
  {"q": "A group of organs working together to carry out a major body function forms an organ", "o": ["Tissue", "Cell", "System", "Organelle"], "a": 2, "e": "An organ system is a group of organs working together to perform a major body function, e.g. the digestive system."},
  {"q": "Arrange the following levels of biological organization from simplest to most complex: Cell, Tissue, Organ, Organ system.", "o": ["Organ system, Organ, Tissue, Cell", "Cell, Tissue, Organ, Organ system", "Tissue, Cell, Organ system, Organ", "Organ, Cell, Tissue, Organ system"], "a": 1, "e": "The correct hierarchy from simplest to most complex is: Cell → Tissue → Organ → Organ system."},
],
  govt:[
  {"q": "Government is best defined as", "o": ["a group of citizens", "the machinery/institution through which a state exercises authority", "a political party", "a business organization"], "a": 1, "e": "Government refers to the institution or machinery through which the authority of a state is exercised over its people."},
  {"q": "Which of the following is a basic element of a state?", "o": ["Political party", "Population", "Trade union", "Pressure group"], "a": 1, "e": "Population, along with territory, government, and sovereignty, is a fundamental element of a state."},
  {"q": "Which of the following is NOT an essential element of a state?", "o": ["Territory", "Sovereignty", "Population", "A national football team"], "a": 3, "e": "A national football team is not an essential element of statehood; territory, sovereignty, population, and government are."},
  {"q": "Sovereignty in political science refers to", "o": ["the physical land of a country", "the supreme and independent authority of a state", "the population of a country", "a country's flag and anthem"], "a": 1, "e": "Sovereignty is the supreme, independent power or authority of a state to govern itself without external control."},
  {"q": "Internal sovereignty refers to a state's supreme authority", "o": ["over its own internal affairs and citizens", "to conduct relations with other states", "to declare war on other nations only", "to print its currency only"], "a": 0, "e": "Internal sovereignty is the state's supreme power and authority over matters within its own territory and citizens."},
  {"q": "External sovereignty refers to a state's", "o": ["control over its citizens only", "independence and equality in relation to other states", "control over local governments", "judicial powers only"], "a": 1, "e": "External sovereignty refers to a state's independence and freedom from external control in its relations with other states."},
  {"q": "A monarchy is a form of government where", "o": ["power is inherited by a king or queen", "leaders are elected by the people", "the military rules directly", "power is shared equally among citizens"], "a": 0, "e": "A monarchy is headed by a king, queen, or similar hereditary ruler who typically inherits the position."},
  {"q": "A republic is a form of government in which", "o": ["a king rules by inheritance", "the head of state is usually elected, not inherited", "the military controls the state permanently", "there is no head of state at all"], "a": 1, "e": "In a republic, the head of state is typically elected rather than inheriting the position, unlike in a monarchy."},
  {"q": "A form of government in which power is concentrated in a single central authority, with little power given to regions, is called a", "o": ["Federal system", "Unitary system", "Confederate system", "Theocratic system"], "a": 1, "e": "A unitary system of government concentrates political power at the centre, with regions having limited independent authority."},
  {"q": "A form of government where power is constitutionally shared between a central government and component states/regions is called a", "o": ["Unitary system", "Federal system", "Monarchy", "Theocracy"], "a": 1, "e": "A federal system divides power constitutionally between a central (federal) government and regional (state) governments."},
  {"q": "A form of government where political and legal authority is believed to be derived from religious law or divine guidance is called a", "o": ["Theocracy", "Democracy", "Aristocracy", "Oligarchy"], "a": 0, "e": "A theocracy is a system of government where religious leaders or laws hold ultimate authority, seen as divinely guided."},
  {"q": "A form of government where power rests with a small, privileged group is called an", "o": ["Autocracy", "Oligarchy", "Democracy", "Anarchy"], "a": 1, "e": "An oligarchy is a system of government controlled by a small group of people, often based on wealth or status."},
  {"q": "A form of government where absolute power is held by a single ruler, without constitutional limits, is called an", "o": ["Oligarchy", "Autocracy", "Democracy", "Federation"], "a": 1, "e": "An autocracy concentrates absolute, unchecked power in the hands of a single ruler."},
  {"q": "Democracy is best described as a system of government where", "o": ["power belongs to a single ruler", "power ultimately belongs to and is exercised by the people", "only the military can rule", "power is inherited"], "a": 1, "e": "Democracy is a system in which political power ultimately rests with the people, exercised directly or through elected representatives."},
  {"q": "The three arms/organs of government are the", "o": ["Executive, Legislature and Judiciary", "President, Senate and Police", "Army, Police and Civil Service", "Federal, State and Local"], "a": 0, "e": "Government is traditionally organized into three arms: the Executive, the Legislature, and the Judiciary."},
  {"q": "The arm of government responsible for making laws is the", "o": ["Executive", "Legislature", "Judiciary", "Civil Service"], "a": 1, "e": "The Legislature is the law-making arm of government, e.g. Nigeria's National Assembly."},
  {"q": "The arm of government responsible for implementing and enforcing laws is the", "o": ["Legislature", "Judiciary", "Executive", "Electoral Commission"], "a": 2, "e": "The Executive arm is responsible for implementing, administering, and enforcing the laws made by the legislature."},
  {"q": "The arm of government responsible for interpreting laws and administering justice is the", "o": ["Executive", "Legislature", "Judiciary", "Local Government"], "a": 2, "e": "The Judiciary interprets laws, resolves disputes, and administers justice through the court system."},
  {"q": "The doctrine which states that the three arms of government should be separate and independent of one another is called", "o": ["Rule of law", "Separation of powers", "Federalism", "Fundamental rights"], "a": 1, "e": "The separation of powers is a doctrine that divides governmental authority among the executive, legislature, and judiciary to prevent abuse of power."},
  {"q": "A system of checks and balances exists mainly to", "o": ["give one arm of government total control", "prevent any single arm of government from becoming too powerful", "abolish the judiciary", "eliminate elections"], "a": 1, "e": "Checks and balances allow each arm of government to limit the powers of the others, preventing the abuse of authority."},
  {"q": "The head of the Executive arm of government in a presidential system is the", "o": ["Chief Justice", "Speaker of the House", "President", "Senate President"], "a": 2, "e": "In a presidential system, the President heads the Executive arm of government."},
  {"q": "The head of the Judiciary in Nigeria is the", "o": ["President", "Chief Justice of Nigeria", "Speaker of the House of Representatives", "Inspector General of Police"], "a": 1, "e": "The Chief Justice of Nigeria heads the Judiciary, the arm of government responsible for interpreting the law."},
  {"q": "Which arm of government is primarily responsible for drafting and passing the national budget into law?", "o": ["Judiciary", "Legislature", "Civil Service", "Police"], "a": 1, "e": "The Legislature debates, amends, and passes the budget bill into law, working with the Executive that proposes it."},
  {"q": "Which of the following best distinguishes a state from a nation?", "o": ["A state is a political/legal unit, while a nation is a group united by shared culture, language, or identity", "A state has no government, while a nation does", "A nation always has more than one government", "There is no difference between the two"], "a": 0, "e": "A state is a defined political and legal entity, while a nation refers to a group of people sharing common cultural, historical, or linguistic bonds."},
  {"q": "Which of the following is a function of government?", "o": ["Maintaining law and order", "Manufacturing consumer products for profit", "Running private businesses exclusively", "Avoiding taxation"], "a": 0, "e": "Maintaining law and order, providing security, and delivering public services are core functions of government."},
  {"q": "The territory of a state refers to", "o": ["its population size", "the defined geographical area over which it exercises authority", "its economic system", "its list of political parties"], "a": 1, "e": "Territory is the clearly defined geographical area within which a state exercises its authority and jurisdiction."},
],
  geo:[
  {"q": "A map is best defined as a", "o": ["photograph of the Earth's surface taken from space", "scaled-down representation of part or all of the Earth's surface on a flat plane", "three-dimensional model of a landform", "list of place names only"], "a": 1, "e": "A map is a scaled-down, symbolic representation of the Earth's surface (or part of it) drawn on a flat plane."},
  {"q": "The ratio between a distance on a map and the corresponding actual distance on the ground is called the", "o": ["Legend", "Scale", "Grid reference", "Contour interval"], "a": 1, "e": "Scale expresses the relationship between distance on a map and the corresponding real distance on the ground."},
  {"q": "A scale expressed as a ratio, such as 1:50,000, is known as a", "o": ["Statement scale", "Representative Fraction (RF) scale", "Linear scale", "Vertical scale"], "a": 1, "e": "A Representative Fraction (RF) scale expresses the map-to-ground ratio as a fraction or ratio, such as 1:50,000."},
  {"q": "A scale expressed in words, such as '1 centimetre represents 1 kilometre', is called a", "o": ["Representative Fraction scale", "Statement scale", "Linear (graphical) scale", "Vertical scale"], "a": 1, "e": "A statement scale describes the map-to-ground relationship in words, such as '1 cm represents 1 km'."},
  {"q": "A scale represented as a line divided into units to allow direct measurement on a map is called a", "o": ["Statement scale", "Representative Fraction scale", "Linear (graphical) scale", "Contour scale"], "a": 2, "e": "A linear (graphical) scale is a drawn line marked with units, allowing distances to be measured directly from the map."},
  {"q": "On a map with a scale of 1:50,000, a distance of 4 cm on the map represents an actual ground distance of", "o": ["200 m", "2 km", "20 km", "200 km"], "a": 1, "e": "1 cm represents 50,000 cm (0.5 km). So 4 cm represents 4 × 0.5 km = 2 km."},
  {"q": "The key on a map that explains the meaning of symbols and colours used is called the", "o": ["Scale", "Legend (key)", "Grid reference", "Northline"], "a": 1, "e": "The legend (key) explains what the various symbols, colours, and signs on a map represent."},
  {"q": "Lines on a map that connect points of equal elevation above sea level are called", "o": ["Grid lines", "Contour lines", "Meridians", "Isotherms"], "a": 1, "e": "Contour lines connect points of equal elevation, used to represent the shape and height of land on a topographical map."},
  {"q": "Contour lines that are close together on a map generally indicate", "o": ["a gentle, flat slope", "a steep slope", "a river", "a lake"], "a": 1, "e": "Closely spaced contour lines indicate a steep slope, since elevation changes rapidly over a short horizontal distance."},
  {"q": "A method used to describe the exact location of a point on a map using numbered vertical and horizontal lines is called a", "o": ["Contour interval", "Grid reference", "Legend", "Bearing"], "a": 1, "e": "A grid reference uses the numbered grid lines (eastings and northings) on a map to precisely locate a specific point."},
  {"q": "The direction indicator on a map, usually an arrow pointing towards true or magnetic north, is called the", "o": ["Legend", "North arrow (northline)", "Scale bar", "Grid line"], "a": 1, "e": "The north arrow (northline) shows the direction of north on a map, helping users orient the map correctly."},
  {"q": "The measurement of the direction of one point from another, expressed in degrees from north, is called", "o": ["Scale", "Bearing", "Contour interval", "Grid reference"], "a": 1, "e": "Bearing is the angular direction of one location from another, measured clockwise from north in degrees (0°-360°)."},
  {"q": "Statistical data on a map or report can be effectively presented using diagrams such as", "o": ["bar charts, pie charts, and line graphs", "only handwritten notes", "only photographs", "legends alone"], "a": 0, "e": "Bar charts, pie charts, and line graphs are common diagrammatic methods used to present and interpret statistical (numerical) data."},
  {"q": "A pie chart is particularly useful for showing", "o": ["changes over time only", "the proportion of different categories that make up a whole", "exact numerical values only", "elevation changes on land"], "a": 1, "e": "A pie chart visually represents how a whole is divided into proportional parts or categories, shown as slices of a circle."},
  {"q": "A line graph is particularly useful for showing", "o": ["proportions of a whole", "trends or changes in data over a period of time", "the location of towns", "the elevation of mountains"], "a": 1, "e": "A line graph effectively displays trends and changes in data over a continuous period, such as rainfall over months."},
  {"q": "Elementary surveying in geography involves", "o": ["measuring and mapping land features and distances using instruments", "only reading printed maps", "weather forecasting", "population counting only"], "a": 0, "e": "Surveying involves measuring and recording land features, distances, and elevations using tools like tapes, compasses, and levels, to create accurate maps."},
  {"q": "A simple instrument used in basic surveying to measure horizontal angles and directions is the", "o": ["Barometer", "Prismatic compass", "Thermometer", "Rain gauge"], "a": 1, "e": "A prismatic compass is commonly used in elementary surveying to measure bearings and horizontal directions in the field."},
  {"q": "A Geographic Information System (GIS) is best described as a", "o": ["type of paper map only", "computer-based system for capturing, storing, analysing, and displaying geographically referenced data", "weather forecasting tool only", "farming technique"], "a": 1, "e": "GIS is a computer-based system used to capture, store, manage, analyse, and visually display data linked to specific geographic locations."},
  {"q": "One key advantage of using GIS over traditional paper maps is that GIS allows users to", "o": ["only view static, unchangeable images", "layer, update, and analyse multiple types of spatial data digitally", "avoid using any coordinates", "eliminate the need for scale"], "a": 1, "e": "GIS allows users to combine, update, and analyse multiple layers of spatial data digitally, offering flexibility beyond static paper maps."},
  {"q": "Which of the following is a practical application of GIS?", "o": ["Urban planning and disaster management", "Cooking recipes", "Music composition", "Sports commentary"], "a": 0, "e": "GIS is widely applied in fields like urban planning, disaster management, environmental monitoring, and resource management."},
],
  agric:[
  {"q": "Agriculture is best defined as", "o": ["the study of animals only", "the science and practice of cultivating crops and rearing animals for human use", "the study of rocks and minerals", "the buying and selling of farm produce only"], "a": 1, "e": "Agriculture is the science and practice of cultivating land, growing crops, and rearing animals for food and other human needs."},
  {"q": "The scope of agriculture includes which of the following branches?", "o": ["Crop production and animal production only", "Crop production, animal production, forestry, and fisheries", "Only forestry", "Only crop production"], "a": 1, "e": "Agriculture's scope is broad, covering crop production, animal husbandry, forestry, and fisheries, among other areas."},
  {"q": "Agriculture is important to the economy mainly because it", "o": ["provides food, raw materials, employment, and income", "has no relevance to national development", "only benefits farmers directly involved", "reduces a country's export earnings"], "a": 0, "e": "Agriculture is vital to national economies as it provides food, raw materials for industry, employment, and income/export earnings."},
  {"q": "Which of the following best describes the importance of agriculture in providing raw materials?", "o": ["Cotton for the textile industry", "Only fuel for vehicles", "Only building materials for construction", "Only electronics manufacturing"], "a": 0, "e": "Agriculture supplies raw materials, such as cotton for textiles, rubber for tyres, and cocoa for confectionery, to various industries."},
  {"q": "Agricultural ecology is the study of", "o": ["farm accounting practices", "the relationship between farm organisms (crops, animals) and their environment", "the marketing of agricultural produce", "farm machinery repair"], "a": 1, "e": "Agricultural ecology studies the interactions between crops, farm animals, and their surrounding environment."},
  {"q": "An ecosystem in agriculture, such as a farmland, consists of", "o": ["only living organisms", "only non-living components like soil and climate", "both living organisms and non-living environmental factors interacting together", "only farm buildings"], "a": 2, "e": "An agricultural ecosystem includes both living components (crops, animals, pests) and non-living factors (soil, climate, water) interacting together."},
  {"q": "Which of the following is an abiotic (non-living) factor affecting agricultural ecology?", "o": ["Soil type", "Weeds", "Farm animals", "Pests"], "a": 0, "e": "Soil type is a non-living (abiotic) environmental factor that significantly influences crop growth and agricultural productivity."},
  {"q": "Genetics in agriculture is the study of how", "o": ["farm records are kept", "hereditary traits are passed from parent crops/animals to their offspring", "land is prepared for farming", "farm produce is marketed"], "a": 1, "e": "Genetics in agriculture studies how hereditary characteristics are transmitted from parent crops or animals to their offspring, useful for breeding improved varieties."},
  {"q": "Selective breeding in agriculture is used mainly to", "o": ["reduce crop yield", "improve desirable traits such as yield, disease resistance, and growth rate in plants or animals", "eliminate all variation in a species", "increase pest attacks"], "a": 1, "e": "Selective breeding involves choosing parent plants or animals with desirable traits to produce improved offspring, such as higher yield or disease resistance."},
  {"q": "A characteristic passed from parents to offspring through genes is called a", "o": ["Mutation", "Hereditary (inherited) trait", "Environmental trait only", "Acquired trait"], "a": 1, "e": "A hereditary trait is a characteristic passed from parents to their offspring through genetic material (genes)."},
  {"q": "Farm inputs refer to", "o": ["the finished products sold by a farmer", "the resources used by a farmer to produce agricultural output, such as seeds, fertilizer, and labour", "only the farmer's personal income", "only farm buildings"], "a": 1, "e": "Farm inputs are the resources — such as seeds, fertilizers, labour, and machinery — used by a farmer in the production process."},
  {"q": "Which of the following is an example of a farm input?", "o": ["Harvested maize", "Fertilizer", "Farm profit", "Market price"], "a": 1, "e": "Fertilizer is a farm input used to improve soil fertility and boost crop production, unlike harvested maize which is an output."},
  {"q": "Improved seed varieties, as a farm input, are important mainly because they can", "o": ["reduce crop yield significantly", "offer higher yield, disease resistance, or faster maturity compared to local varieties", "increase the cost of farming with no benefit", "eliminate the need for water"], "a": 1, "e": "Improved seed varieties are developed to offer benefits such as higher yield, disease resistance, or shorter maturity periods, boosting farm productivity."},
  {"q": "Labour, as a farm input, refers to", "o": ["the physical and mental effort applied by people to farm production", "only machinery used on the farm", "the land used for farming", "the money invested in farming"], "a": 0, "e": "Labour refers to the human effort — physical and mental — applied to carry out farm operations and production activities."},
  {"q": "Historically, early agricultural development in West Africa was based mainly on", "o": ["fully mechanized industrial farming", "traditional methods such as shifting cultivation and the use of simple hand tools", "genetically modified crops exclusively", "large-scale greenhouse farming"], "a": 1, "e": "Early West African agriculture relied on traditional methods, including shifting cultivation and simple hand tools like the hoe and cutlass."},
  {"q": "Shifting cultivation, as practiced historically, involves", "o": ["farming the same piece of land continuously without rest", "cultivating a piece of land for a period, then abandoning it to fallow while farming another plot", "using only chemical fertilizers", "permanent settlement with modern irrigation"], "a": 1, "e": "Shifting cultivation involves farming a plot of land for some years, then leaving it fallow to regain fertility while moving to cultivate a new plot."},
  {"q": "The introduction of new crops (such as cassava and maize) to West Africa historically came mainly through", "o": ["local domestication of all crops only", "contact and trade with other regions, especially through early European exploration", "government research alone", "the Trans-Saharan trade route only"], "a": 1, "e": "Crops such as cassava and maize were introduced into West African agriculture historically through trade and contact linked to early European exploration."},
  {"q": "The development of agriculture over time, from traditional to modern practices, has been influenced mainly by", "o": ["advances in science, technology, and improved farm inputs", "a decrease in the world's population", "the disappearance of all farmland", "complete abandonment of traditional knowledge"], "a": 0, "e": "Agricultural development has progressed through advances in science and technology, improved farm inputs, and modern techniques that boost productivity."},
  {"q": "Modern agricultural development, compared to traditional practices, is characterized mainly by", "o": ["greater use of mechanization, improved inputs, and scientific methods", "complete reliance on manual labour only", "abandonment of all farm inputs", "reduced crop and animal productivity"], "a": 0, "e": "Modern agriculture is marked by increased mechanization, use of improved seeds/fertilizers, and application of scientific knowledge to boost productivity."},
],
  english:[
  {"q": "A word that names a person, place, thing, or idea is called a", "o": ["verb", "noun", "adverb", "preposition"], "a": 1, "e": "A noun is a word used to name a person, place, thing, or idea."},
  {"q": "A word that describes or modifies a noun is called a(n)", "o": ["adjective", "verb", "conjunction", "interjection"], "a": 0, "e": "An adjective describes or gives more information about a noun."},
  {"q": "A word that shows action or a state of being is called a", "o": ["noun", "verb", "preposition", "adjective"], "a": 1, "e": "A verb expresses an action (run, eat) or a state of being (is, seem)."},
  {"q": "A word used in place of a noun is called a", "o": ["pronoun", "adverb", "conjunction", "preposition"], "a": 0, "e": "A pronoun (he, she, it, they) replaces a noun to avoid repetition."},
  {"q": "A word that modifies a verb, adjective, or another adverb is called a(n)", "o": ["noun", "adverb", "preposition", "conjunction"], "a": 1, "e": "An adverb often describes how, when, or where an action happens, e.g. 'quickly', 'yesterday'."},
  {"q": "A word that shows the relationship between a noun/pronoun and other words in a sentence is called a", "o": ["preposition", "interjection", "conjunction", "verb"], "a": 0, "e": "A preposition (in, on, under, before) shows the relationship of a noun or pronoun to another word in the sentence."},
  {"q": "A word that joins words, phrases, or clauses is called a", "o": ["pronoun", "conjunction", "adjective", "interjection"], "a": 1, "e": "A conjunction (and, but, or, because) connects words, phrases, or clauses."},
  {"q": "A word that expresses sudden emotion, usually followed by an exclamation mark, is called a(n)", "o": ["interjection", "preposition", "noun", "verb"], "a": 0, "e": "An interjection (Wow! Oh! Alas!) expresses sudden feeling or emotion."},
  {"q": "Which tense is used to describe an action happening right now?", "o": ["Past tense", "Present tense", "Future tense", "Past perfect tense"], "a": 1, "e": "The present tense is used for actions happening now or habitually, e.g. 'She writes every day.'"},
  {"q": "Which tense describes an action that has already been completed?", "o": ["Present tense", "Future tense", "Past tense", "Present continuous tense"], "a": 2, "e": "The past tense describes an action that has already happened, e.g. 'She wrote a letter.'"},
  {"q": "Which tense describes an action that will happen later?", "o": ["Past tense", "Present tense", "Future tense", "Past continuous tense"], "a": 2, "e": "The future tense describes an action that has not yet happened but will, e.g. 'She will write a letter.'"},
  {"q": "Choose the correct present continuous form: She ______ to school now.", "o": ["go", "goes", "is going", "went"], "a": 2, "e": "Present continuous is formed with 'is/am/are + verb-ing': 'is going' describes an action happening right now."},
  {"q": "Choose the correct past tense of 'go'.", "o": ["goed", "went", "gone", "going"], "a": 1, "e": "'Go' is an irregular verb; its simple past tense form is 'went'."},
  {"q": "Choose the sentence in the future tense.", "o": ["He plays football every day.", "He played football yesterday.", "He will play football tomorrow.", "He is playing football now."], "a": 2, "e": "'Will play' indicates an action that has not yet happened — the future tense."},
  {"q": "Concord (subject-verb agreement) requires that a singular subject takes a", "o": ["plural verb", "singular verb", "past tense verb only", "modal verb only"], "a": 1, "e": "Concord requires that a singular subject agrees with a singular verb form, e.g. 'He walks', not 'He walk'."},
  {"q": "Choose the correct option. The group of students ______ studying hard.", "o": ["is", "are", "were", "have"], "a": 0, "e": "Collective nouns like 'group' are usually treated as singular, taking a singular verb: 'is studying'."},
  {"q": "Choose the correct option. Each of the boys ______ a book.", "o": ["have", "has", "having", "were having"], "a": 1, "e": "'Each' is singular, so it takes a singular verb: 'has'."},
  {"q": "Choose the correct option. Neither the teacher nor the students ______ present.", "o": ["is", "was", "are", "has"], "a": 2, "e": "With 'neither...nor', the verb agrees with the noun nearer to it — 'students' is plural, so 'are' is correct."},
  {"q": "Choose the correct option. The news ______ shocking.", "o": ["is", "are", "were", "have been"], "a": 0, "e": "'News' is an uncountable noun that is always treated as singular, taking 'is'."},
  {"q": "Choose the correct option. My brother, along with his friends, ______ coming today.", "o": ["is", "are", "were", "have"], "a": 0, "e": "When a phrase like 'along with...' comes between the subject and verb, the verb agrees with the main subject ('brother' — singular): 'is'."},
  {"q": "A sentence with only one independent clause and no dependent clause is called a", "o": ["Compound sentence", "Simple sentence", "Complex sentence", "Compound-complex sentence"], "a": 1, "e": "A simple sentence contains a single independent clause with a subject and a verb, expressing one complete thought."},
  {"q": "A sentence made up of two or more independent clauses joined by a coordinating conjunction is called a", "o": ["Simple sentence", "Complex sentence", "Compound sentence", "Fragment"], "a": 2, "e": "A compound sentence joins two or more independent clauses using conjunctions like 'and', 'but', or 'or'."},
  {"q": "A sentence with one independent clause and at least one dependent clause is called a", "o": ["Simple sentence", "Compound sentence", "Complex sentence", "Run-on sentence"], "a": 2, "e": "A complex sentence combines an independent clause with one or more dependent (subordinate) clauses."},
  {"q": "Identify the simple sentence.", "o": ["The rain fell, and the streets flooded.", "The rain fell.", "Because it rained, the streets flooded.", "The rain fell; the streets flooded."], "a": 1, "e": "'The rain fell' is a single independent clause with no additional clauses — a simple sentence."},
  {"q": "Which sentence pattern below is Subject-Verb-Object (SVO)?", "o": ["She sings.", "She is happy.", "She ate the food.", "Run quickly!"], "a": 2, "e": "'She ate the food' follows the Subject (She) - Verb (ate) - Object (the food) pattern."},
  {"q": "Which of these is a Subject-Verb-Complement (SVC) sentence?", "o": ["He kicked the ball.", "He is a doctor.", "He runs fast.", "He gave her a gift."], "a": 1, "e": "'He is a doctor' follows Subject-Verb-Complement, where the complement (doctor) describes the subject."},
  {"q": "In the sentence 'The boy gave his mother flowers', which grammatical pattern is used?", "o": ["Subject-Verb", "Subject-Verb-Object", "Subject-Verb-Indirect Object-Direct Object", "Subject-Verb-Complement"], "a": 2, "e": "'Gave his mother flowers' follows Subject-Verb-Indirect Object (mother)-Direct Object (flowers)."},
  {"q": "Choose the correctly formed plural noun.", "o": ["Childs", "Children", "Childes", "Childrens"], "a": 1, "e": "The plural of 'child' is irregular: 'children', not 'childs'."},
  {"q": "Choose the correct possessive form. The books belonging to the boys.", "o": ["The boys book", "The boy's books", "The boys' books", "The boy books"], "a": 2, "e": "For a plural noun already ending in 's' (boys), the possessive apostrophe is placed after the 's': 'boys' books'."},
  {"q": "Which word functions as an auxiliary (helping) verb in: 'She has finished her homework'?", "o": ["She", "has", "finished", "homework"], "a": 1, "e": "'Has' is an auxiliary verb helping to form the present perfect tense with the main verb 'finished'."},
],
  crs:[
  {"q": "The Bible opens with the account of God creating the heavens and the earth in the book of", "o": ["Exodus", "Genesis", "Leviticus", "Numbers"], "a": 1, "e": "The book of Genesis begins with the account of God's creation of the heavens and the earth."},
  {"q": "According to Genesis, God created the world in how many days, resting on the seventh?", "o": ["Five days", "Six days", "Seven days", "Eight days"], "a": 1, "e": "Genesis 1 records that God created the world in six days and rested on the seventh."},
  {"q": "On which day did God create man, according to the creation account?", "o": ["Third day", "Fourth day", "Fifth day", "Sixth day"], "a": 3, "e": "Genesis 1:26-27 records that God created man on the sixth day, in His own image."},
  {"q": "According to Genesis, man was formed by God from", "o": ["water", "dust of the ground", "a rib only", "fire"], "a": 1, "e": "Genesis 2:7 records that God formed man from the dust of the ground and breathed life into him."},
  {"q": "Eve was created by God from", "o": ["dust of the ground", "a rib taken from Adam", "clay", "water"], "a": 1, "e": "Genesis 2:21-22 records that God formed Eve from a rib taken from Adam."},
  {"q": "The sovereignty of God refers to His", "o": ["limited power over only some things", "supreme power and absolute authority over all creation", "dependence on human approval", "physical location in the sky"], "a": 1, "e": "God's sovereignty refers to His supreme, unlimited power and authority over the entire universe and all creation."},
  {"q": "The belief that God has complete control and rule over everything that happens demonstrates His", "o": ["weakness", "sovereignty", "forgetfulness", "mortality"], "a": 1, "e": "God's control and rule over all things, including nature and human history, is an expression of His sovereignty."},
  {"q": "The Garden where Adam and Eve lived after creation was called the Garden of", "o": ["Gethsemane", "Eden", "Canaan", "Sinai"], "a": 1, "e": "Genesis 2 records that Adam and Eve were placed in the Garden of Eden after their creation."},
  {"q": "Adam and Eve disobeyed God by eating fruit from", "o": ["the tree of life", "the tree of the knowledge of good and evil", "a fig tree", "any tree in the garden"], "a": 1, "e": "Genesis 3 records that Adam and Eve disobeyed God's command by eating fruit from the tree of the knowledge of good and evil."},
  {"q": "The consequence of Adam and Eve's disobedience was that they were", "o": ["given more blessings", "driven out of the Garden of Eden", "made immortal", "rewarded with riches"], "a": 1, "e": "Genesis 3 records that as a consequence of their disobedience, Adam and Eve were driven out of the Garden of Eden."},
  {"q": "A covenant, in biblical terms, is best described as", "o": ["a casual conversation", "a solemn agreement or promise between God and His people", "a type of sacrifice only", "a Jewish festival"], "a": 1, "e": "A covenant is a solemn, binding agreement between God and His people, often involving promises and obligations on both sides."},
  {"q": "God's covenant with Noah after the flood included the promise that", "o": ["He would never again destroy the earth by flood", "humans would live forever", "there would be no more seasons", "animals would no longer exist"], "a": 0, "e": "Genesis 9 records God's covenant with Noah, promising never again to destroy the earth by a flood."},
  {"q": "The sign of God's covenant with Noah was the", "o": ["burning bush", "rainbow", "ark of the covenant", "tablets of stone"], "a": 1, "e": "Genesis 9:13 records that God set the rainbow in the clouds as the sign of His covenant with Noah."},
  {"q": "God's covenant with Abraham included the promise that", "o": ["Abraham would remain childless", "Abraham's descendants would become a great nation", "Abraham would never leave his homeland", "Abraham would rule over Egypt"], "a": 1, "e": "Genesis 12 and 15 record God's covenant with Abraham, promising to make his descendants into a great nation."},
  {"q": "The sign of God's covenant with Abraham was", "o": ["circumcision", "baptism", "the rainbow", "the Passover"], "a": 0, "e": "Genesis 17 records circumcision as the sign of the covenant between God and Abraham and his descendants."},
  {"q": "God's guidance of His people is often demonstrated in the Bible through", "o": ["random events with no divine involvement", "direct instructions, dreams, prophets, and providential care", "human government alone", "natural disasters only"], "a": 1, "e": "Throughout the Bible, God guides His people through direct instructions, dreams, prophets, and providential intervention."},

  lit:[
  {"q": "Literature is best defined as", "o": ["any written or spoken material with no artistic value", "imaginative or artistic writing that expresses human experience", "only textbooks used in school", "technical manuals and reports"], "a": 1, "e": "Literature is imaginative and artistic writing (or oral art) that expresses human thoughts, feelings, and experiences."},
  {"q": "The three major genres of literature are", "o": ["Prose, Drama and Poetry", "Fiction, Non-fiction and Biography", "Novels, Essays and Letters", "Comedy, Tragedy and Satire"], "a": 0, "e": "Literature is broadly classified into three genres: Prose, Drama, and Poetry."},
  {"q": "One of the main functions of literature is to", "o": ["provide only entertainment with no other value", "entertain, educate, and reflect on human society and experience", "replace scientific textbooks", "serve only religious purposes"], "a": 1, "e": "Literature functions to entertain, educate, and offer insight into human nature and society, among other purposes."},
  {"q": "Literature that mirrors and comments on the values, problems, or events of society is said to perform which function?", "o": ["Aesthetic function only", "Social/reflective function", "No function at all", "Purely commercial function"], "a": 1, "e": "Literature often reflects society, commenting on its values, conflicts, and experiences — this is its social/reflective function."},
  {"q": "Oral literature refers to literary works that are", "o": ["always written down first", "passed down and performed by word of mouth", "only found in modern novels", "exclusively religious texts"], "a": 1, "e": "Oral literature consists of stories, songs, proverbs, and traditions passed down and performed by word of mouth, especially in traditional societies."},
  {"q": "Written literature differs from oral literature mainly because it is", "o": ["performed live only", "recorded in a fixed written form", "always anonymous", "never studied in schools"], "a": 1, "e": "Written literature is recorded in a fixed textual form, unlike oral literature which is transmitted by speech and performance."},
  {"q": "The imaginative and fictional prose narrative, usually of considerable length, is called a", "o": ["Poem", "Novel", "Essay", "Biography"], "a": 1, "e": "A novel is a long, imaginative work of prose fiction that develops characters and plot in depth."},
  {"q": "Prose literature is characterized mainly by", "o": ["ordinary language organized in sentences and paragraphs, without a fixed metrical pattern", "strict rhyme and meter", "dialogue performed on a stage", "short, rhythmic verse only"], "a": 0, "e": "Prose is written in ordinary language, arranged in sentences and paragraphs, without the fixed meter or rhyme scheme found in poetry."},
  {"q": "Drama is a literary genre distinguished mainly by its", "o": ["use of narration only", "composition for performance, involving dialogue and action on a stage", "being written only in verse", "lack of characters"], "a": 1, "e": "Drama is written to be performed, using dialogue and action carried out by characters, typically on a stage."},
  {"q": "Poetry as a literary genre is distinguished mainly by its", "o": ["use of ordinary prose sentences", "imaginative, rhythmic, and often figurative use of language", "complete absence of emotion", "exclusive use for religious purposes"], "a": 1, "e": "Poetry uses condensed, rhythmic, and often figurative language to express ideas and emotions imaginatively."},
  {"q": "The term 'plot' in literature refers to", "o": ["the setting of a story", "the sequence of events and their cause-and-effect relationship in a story", "a character's personality", "the author's biography"], "a": 1, "e": "Plot is the structured sequence of events in a narrative, usually connected by cause and effect."},
  {"q": "The term 'theme' in literature refers to", "o": ["the physical location of a story", "the central idea or underlying message of a literary work", "the author's name", "the length of a book"], "a": 1, "e": "Theme is the central idea, message, or insight about life that a literary work conveys."},
  {"q": "'Setting' in a literary work refers to", "o": ["the main idea of the story", "the time and place in which the events of a story occur", "the list of characters", "the writer's personal opinion"], "a": 1, "e": "Setting refers to the time period and location in which the events of a literary work take place."},
  {"q": "'Characterization' refers to the process by which an author", "o": ["chooses a title for the work", "creates and develops the personalities of characters in a story", "selects a genre", "designs the book cover"], "a": 1, "e": "Characterization is the technique a writer uses to create, reveal, and develop the personalities of characters."},
  {"q": "'Diction' in literary appreciation refers to a writer's", "o": ["choice and use of words", "choice of setting", "use of chapters", "choice of characters only"], "a": 0, "e": "Diction refers to an author's choice and use of words, which shapes tone, style, and meaning in a literary work."},
  {"q": "The 'protagonist' of a story is", "o": ["a minor character", "the main character around whom the story revolves", "the author of the work", "the setting of the story"], "a": 1, "e": "The protagonist is the central or main character in a literary work, around whom the plot mainly develops."},
  {"q": "The 'antagonist' of a story is", "o": ["the character who supports the protagonist", "the character or force that opposes the protagonist", "the narrator", "the setting"], "a": 1, "e": "The antagonist is the character or force that creates conflict by opposing the protagonist."},
  {"q": "'Conflict' in literature refers to", "o": ["a struggle between opposing forces, either internal or external", "the setting of a story", "the biography of an author", "the physical size of a book"], "a": 0, "e": "Conflict is the central struggle in a narrative, which can be internal (within a character) or external (between characters or forces)."},
  {"q": "An internal conflict is a struggle that occurs", "o": ["between two characters", "within a character's own mind", "between a character and nature", "between two nations"], "a": 1, "e": "Internal conflict occurs within a character's mind, such as a struggle between duty and desire."},
  {"q": "An external conflict is a struggle between", "o": ["a character and their own thoughts only", "a character and an outside force (another character, society, or nature)", "two ideas within one mind", "the author and the reader"], "a": 1, "e": "External conflict occurs between a character and an outside force, such as another character, society, or the environment."},
  {"q": "Literary appreciation is best described as", "o": ["memorizing a text word for word", "the critical study and analysis of a literary work's meaning, style, and value", "summarizing a text briefly", "translating a text into another language"], "a": 1, "e": "Literary appreciation involves critically analysing and evaluating a text's content, style, structure, and meaning."},
  {"q": "'Tone' in a literary work refers to", "o": ["the writer's attitude toward the subject or audience", "the physical setting of the story", "the number of characters", "the book's price"], "a": 0, "e": "Tone reflects the author's attitude toward the subject matter or audience, conveyed through word choice and style."},
  {"q": "'Mood' in a literary work refers to", "o": ["the writer's biography", "the emotional atmosphere experienced by the reader", "the number of chapters", "the title of the work"], "a": 1, "e": "Mood is the emotional atmosphere a reader feels while engaging with a literary work."},
  {"q": "A 'narrator' in a literary work is", "o": ["the person who tells the story", "always the author themselves", "a minor character only", "the publisher of the book"], "a": 0, "e": "A narrator is the voice that tells or relates the events of a story to the reader."},
  {"q": "The relevance of studying literature includes developing", "o": ["only technical writing skills", "critical thinking, empathy, and appreciation of language and culture", "mathematical computation skills", "only memorization skills"], "a": 1, "e": "Studying literature helps develop critical thinking, empathy, cultural awareness, and appreciation for the artistic use of language."},
],
  history:[

  {"q": "Unlike centralized kingdoms, many Igbo communities in the pre-colonial period were organized mainly through", "o": ["a single powerful king ruling all Igbo communities", "decentralized systems based on village councils and lineage groups", "a hereditary emperor", "foreign colonial administrators"], "a": 1, "e": "Many Igbo communities practiced decentralized governance, organized through village councils, age grades, and lineage systems rather than a single central king."},
  {"q": "The main economic activities of pre-colonial communities in the Nigerian area included", "o": ["farming, fishing, hunting, and craft production", "only oil drilling", "stock market trading", "industrial manufacturing"], "a": 0, "e": "Pre-colonial economies were based mainly on farming, fishing, hunting, gathering, and craft production like weaving and blacksmithing."},
  {"q": "Trans-Saharan trade routes connected the Nigerian area mainly with", "o": ["North Africa and the Mediterranean world", "South America", "Western Europe directly", "East Asia"], "a": 0, "e": "Trans-Saharan trade routes linked northern Nigerian states, like Kanem-Bornu and the Hausa states, with North Africa and the Mediterranean."},
